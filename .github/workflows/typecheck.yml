name: Type check

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  mypy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install type checker
        run: |
          python -m pip install --upgrade pip
          python -m pip install mypy

      - name: Run mypy
        run: mypy ui/menus.py services/browse_service.py models/schemas.py --ignore-missing-imports
